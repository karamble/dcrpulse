services:
  dcrd:
    image: ghcr.io/karamble/dcrpulse-dcrd:${DCRD_IMAGE_TAG:-latest}
    build:
      context: ./dcrd
      args:
        DCRD_VERSION: ${DCRD_VERSION:-release-v2.1.5}
    container_name: dcrpulse-dcrd
    ports:
      - "${DCRD_P2P_HOST_BIND:-0.0.0.0}:9108:9108"
      - "127.0.0.1:9109:9109"
    volumes:
      - ${APP_DATA_DIR:-app-data}:/app-data
      - ${TOR_DATA_DIR:-tor-data}:/app-data/tor:ro
    environment:
      - DCRD_EXTRA_ARGS=${DCRD_EXTRA_ARGS:---txindex}
      - TOR_PROXY_IP=tor
      - TOR_PROXY_PORT=9050
    command: >
      --rpcuser=${DCRD_RPC_USER:-decred}
      --rpcpass=${DCRD_RPC_PASS:-decredpass}
      --rpclisten=0.0.0.0:9109
      --rpccert=/app-data/dcrd/rpc.cert
      --rpckey=/app-data/dcrd/rpc.key
    restart: unless-stopped
    networks:
      - decred-network
    healthcheck:
      # Healthy when the RPC answers, OR when the node is busy running a one-time
      # database upgrade/reindex at startup (RPC is not up yet during that, but the
      # node is working, not broken). The upgrade markers are read from dcrd's own
      # log. This lets the stack come up during an upgrade so the dashboard can show
      # "database upgrade in progress" instead of depends_on aborting it.
      test: ["CMD", "sh", "-c", "curl -k -u ${DCRD_RPC_USER:-decred}:${DCRD_RPC_PASS:-decredpass} -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"1.0\",\"method\":\"getinfo\",\"params\":[],\"id\":1}' https://127.0.0.1:9109 >/dev/null 2>&1 && exit 0; tail -n 80 /app-data/dcrd/logs/*/dcrd.log 2>/dev/null | grep -qiE 'upgrading database|upgrading utxo|upgrading spend journal|migrating database|migrating utxo|migrating versioning|reindexing|creating and storing gcs filters' && exit 0; exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
      start_interval: 10s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
        reservations:
          memory: 2G

  dcrwallet:
    image: ghcr.io/karamble/dcrpulse-dcrwallet:${DCRWALLET_IMAGE_TAG:-latest}
    build:
      context: ./dcrwallet
      args:
        DCRWALLET_VERSION: ${DCRWALLET_VERSION:-release-v2.1.5}
    container_name: dcrpulse-dcrwallet
    ports:
      - "127.0.0.1:9110:9110"
      - "127.0.0.1:9111:9111"
    volumes:
      - ${APP_DATA_DIR:-app-data}:/app-data
    environment:
      - DCRWALLET_RPC_USER=${DCRWALLET_RPC_USER:-dcrwallet}
      - DCRWALLET_RPC_PASS=${DCRWALLET_RPC_PASS:-dcrwalletpass}
      - DCRD_RPC_USER=${DCRD_RPC_USER:-decred}
      - DCRD_RPC_PASS=${DCRD_RPC_PASS:-decredpass}
      - DCRD_RPC_HOST=dcrd
      - DCRWALLET_GAP_LIMIT=${DCRWALLET_GAP_LIMIT:-400}
      - TOR_PROXY_IP=tor
      - TOR_PROXY_PORT=9050
    depends_on:
      dcrd:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - decred-network
    healthcheck:
      test: ["CMD", "sh", "-c", "S=/app-data/dcrwallet/control/state.json; [ -f \"$$S\" ] && [ $$(( $$(date +%s) - $$(stat -c %Y \"$$S\") )) -lt 60 ]"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'
        reservations:
          memory: 1G

  dcrlnd:
    image: ghcr.io/karamble/dcrpulse-dcrlnd:${DCRLND_IMAGE_TAG:-latest}
    build:
      context: ./dcrlnd
      args:
        DCRLND_VERSION: ${DCRLND_VERSION:-v0.8.1}
    container_name: dcrpulse-dcrlnd
    volumes:
      - ${APP_DATA_DIR:-app-data}:/app-data:ro
      - ${DCRLND_DATA_DIR:-dcrlnd-data}:/app-data/dcrlnd
      - ${TOR_DATA_DIR:-tor-data}:/app-data/tor:ro
    environment:
      - DCRWALLET_HOST=dcrwallet
      - DCRWALLET_GRPC_PORT=9111
      - LN_TESTNET=${LN_TESTNET:-false}
      - TOR_PROXY_IP=tor
      - TOR_PROXY_PORT=9050
    depends_on:
      dcrwallet:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - decred-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
        reservations:
          memory: 256M

  brclientd:
    image: ghcr.io/karamble/dcrpulse-brclientd:${BRCLIENTD_IMAGE_TAG:-dev}
    build:
      context: ./brclientd
    container_name: dcrpulse-brclientd
    ports:
      - "127.0.0.1:7677:7677"
      - "${MCP_BRIDGE_HOST:-127.0.0.1}:${MCP_BRIDGE_PORT:-8891}:8891"
    entrypoint: ["/bin/sh", "/supervisor.sh"]
    environment:
      - TOR_PROXY_IP=tor
      - TOR_PROXY_PORT=9050
    volumes:
      - ${APP_DATA_DIR:-app-data}:/app-data:ro
      - ${DCRLND_DATA_DIR:-dcrlnd-data}:/app-data/dcrlnd:ro
      - ${BRCLIENTD_DATA_DIR:-brclientd-data}:/app-data/brclientd
      - ./brclientd/supervisor.sh:/supervisor.sh:ro
    depends_on:
      dcrlnd:
        condition: service_started
    restart: unless-stopped
    networks:
      - decred-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M

  dcrdex:
    image: ghcr.io/karamble/dcrpulse-dcrdex:${DCRDEX_IMAGE_TAG:-dev}
    build:
      context: ./dcrdex
    container_name: dcrpulse-dcrdex
    hostname: dcrdex
    entrypoint:
      - /bin/sh
      - /supervisor.sh
    environment:
      - DCRDEX_RPC_USER=${DCRDEX_RPC_USER:-dcrdex}
      - DCRDEX_RPC_PASS=${DCRDEX_RPC_PASS:-dcrdexpass}
      - TOR_PROXY_IP=tor
      - TOR_PROXY_PORT=9050
    volumes:
      - ${DCRDEX_DATA_DIR:-dcrdex-data}:/dex/.dexc
      - ${APP_DATA_DIR:-app-data}:/app-data:ro
      - ./dcrdex/supervisor.sh:/supervisor.sh:ro
    restart: unless-stopped
    networks:
      - decred-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M

  dashboard:
    image: ghcr.io/karamble/dcrpulse-dashboard:${DASHBOARD_IMAGE_TAG:-latest}
    build: ./dashboard
    container_name: dcrpulse-dashboard
    ports:
      - "${DASHBOARD_HOST_BIND:-127.0.0.1}:${DASHBOARD_PORT:-8080}:8080"
    volumes:
      - ${APP_DATA_DIR:-app-data}:/app-data
      - ${DCRLND_DATA_DIR:-dcrlnd-data}:/app-data/dcrlnd
      - ${BRCLIENTD_DATA_DIR:-brclientd-data}:/app-data/brclientd:ro
      - ${DCRDEX_DATA_DIR:-dcrdex-data}:/app-data/dcrdex:ro
      - ${DASHBOARD_DATA_DIR:-dashboard-data}:/dashboard-data
      - ${TOR_DATA_DIR:-tor-data}:/app-data/tor:ro
    environment:
      - PORT=8080
      - TOR_PROXY_IP=tor
      - TOR_PROXY_PORT=9050
      - TOR_CONTROL_PORT=9051
      - DCRD_RPC_HOST=dcrd
      - DCRD_RPC_PORT=9109
      - DCRD_RPC_USER=${DCRD_RPC_USER:-decred}
      - DCRD_RPC_PASS=${DCRD_RPC_PASS:-decredpass}
      - DCRD_RPC_CERT=/app-data/dcrd/rpc.cert
      - DCRWALLET_RPC_HOST=dcrwallet
      - DCRWALLET_RPC_PORT=9110
      - DCRWALLET_GRPC_PORT=9111
      - DCRWALLET_RPC_USER=${DCRWALLET_RPC_USER:-dcrwallet}
      - DCRWALLET_RPC_PASS=${DCRWALLET_RPC_PASS:-dcrwalletpass}
      - DCRWALLET_RPC_CERT=/app-data/dcrd/rpc.cert
      - DCRLND_HOST=dcrlnd
      - DCRLND_GRPC_PORT=10009
      - DCRLND_TLS_CERT=/app-data/dcrlnd/tls.cert
      - DCRLND_MACAROON=/app-data/dcrlnd/admin.macaroon
      - BRCLIENTD_HOST=brclientd
      - BRCLIENTD_PORT=7676
      - BRCLIENTD_STATUS_PORT=7677
      - BRCLIENTD_DATA_DIR=/app-data/brclientd
      - DCRDEX_RPC_HOST=dcrdex
      - DCRDEX_RPC_PORT=5757
      - DCRDEX_RPC_USER=${DCRDEX_RPC_USER:-dcrdex}
      - DCRDEX_RPC_PASS=${DCRDEX_RPC_PASS:-dcrdexpass}
      - DCRDEX_RPC_CERT=/app-data/dcrdex/rpc.cert
      - DCRDEX_WS_PORT=5758
      - DCRDEX_WS_CERT=/app-data/dcrdex/web.cert
    depends_on:
      dcrd:
        condition: service_healthy
      dcrwallet:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - decred-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M

  tor:
    image: ghcr.io/karamble/dcrpulse-tor:${TOR_IMAGE_TAG:-latest}
    build:
      context: ./tor
    container_name: dcrpulse-tor
    user: "1000:1000"
    environment:
      - HOME=/tmp
    volumes:
      - ${TOR_DATA_DIR:-tor-data}:/data
    restart: unless-stopped
    depends_on:
      dcrd:
        condition: service_started
    networks:
      - decred-network

networks:
  decred-network:
    driver: bridge

volumes:
  app-data:
    name: ${APP_DATA_DIR:-dcrpulse_app-data}
    driver: local
  dashboard-data:
    name: ${DASHBOARD_DATA_DIR:-dcrpulse_dashboard-data}
    driver: local
  dcrlnd-data:
    name: ${DCRLND_DATA_DIR:-dcrpulse_dcrlnd-data}
    driver: local
  brclientd-data:
    name: ${BRCLIENTD_DATA_DIR:-dcrpulse_brclientd-data}
    driver: local
  dcrdex-data:
    name: ${DCRDEX_DATA_DIR:-dcrpulse_dcrdex-data}
    driver: local
  tor-data:
    name: ${TOR_DATA_DIR:-dcrpulse_tor-data}
    driver: local
